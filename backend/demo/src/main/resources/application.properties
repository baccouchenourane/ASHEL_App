# ====================== APPLICATION ======================
spring.application.name=ASHEL

# Port du serveur (tu utilises déjà 8081)
server.port=8081

# ====================== BASE DE DONNÉES MySQL ======================
spring.datasource.url=jdbc:mysql://localhost:3306/ashel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====================== JPA / HIBERNATE ======================
# Important : on ne valide pas strictement le schéma, car la base existante
# peut contenir des types légèrement différents (ENUM/CHAR, DECIMAL/FLOAT, etc.)
# ce qui bloque le démarrage si on met "validate".
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ====================== AUTRES CONFIGURATIONS ======================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

# Désactive Open Session in View (bonne pratique)
spring.jpa.open-in-view=false