# ===========================
# ASHEL App - Backend Config
# ===========================

# Port du serveur
server.port=8081

# --- Base de données H2 (développement) ---
# Pour la production, remplacer par MySQL/PostgreSQL
spring.datasource.url=jdbc:h2:mem:asheldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

